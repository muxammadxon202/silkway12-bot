services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: silkway
      POSTGRES_PASSWORD: silkway
      POSTGRES_DB: silkway
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silkway"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # внутри compose-сети хост БД — это имя сервиса "db"
      DATABASE_URL: postgresql+asyncpg://silkway:silkway@db:5432/silkway
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

volumes:
  pgdata:
