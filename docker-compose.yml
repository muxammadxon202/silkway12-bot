services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: silkway
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: silkway
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silkway"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # внутри compose-сети хост БД — это имя сервиса "db"
      DATABASE_URL: postgresql+asyncpg://silkway:${POSTGRES_PASSWORD}@db:5432/silkway
    depends_on:
      db:
        condition: service_healthy
    # порт наружу НЕ открываем — доступ только через Caddy (TLS)
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      # поддомен API; A-запись должна указывать на IP этого сервера
      API_DOMAIN: ${API_DOMAIN:-api.silkway12.uz}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  pgdata:
  caddy_data:
  caddy_config:
